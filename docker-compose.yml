services:
  # --- KAFKA SUBSYSTEM (KRaft Mode) ---
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_NODE_ID=1
      - KAFKA_CLUSTER_ID=L622_qE_Tnu9H_fR4H9M7w
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093

  # --- DATABASE SUBSYSTEM (CDC Enabled) ---
  postgres:
    image: postgres:18
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=retail_db
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d retail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- AIRFLOW 3.x SUBSYSTEM ---
  airflow-db:
    image: postgres:18
    container_name: airflow-db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-api-server:
    image: apache/airflow:3.2.1
    container_name: airflow-api-server
    restart: always
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      # Automatic Admin Creation to bypass Airflow 3 CLI bug
      - AIRFLOW__FAB__AUTO_CREATE_ADMIN_USER=True
      - AIRFLOW__FAB__ADMIN_USER_USERNAME=admin
      - AIRFLOW__FAB__ADMIN_USER_PASSWORD=admin
      - AIRFLOW__FAB__ADMIN_USER_EMAIL=kanojiamohit07@gmail.com
    ports:
      - "8080:8080"
    command: api-server

  airflow-scheduler:
    image: apache/airflow:3.2.1
    container_name: airflow-scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: scheduler